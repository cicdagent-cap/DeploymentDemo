name: __PIPELINE_NAME__

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      preset:
        description: Select build type
        type: choice
        required: true
        default: Debug-CICD
        options:
          - Debug-CICD
          - Release-CICD

permissions:
  contents: read

concurrency:
  group: cicd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  notify-triggered:
    runs-on: ubuntu-latest
    env:
      CICD_CHAT_PROVIDER: ${{ vars.CICD_CHAT_PROVIDER }}
      TEAM_WEBHOOK_URL: ${{ secrets.TEAM_WEBHOOK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Notify build triggered
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ./scripts/notify.sh triggered "$RUN_URL" "${{ github.ref_name }}"

  ios:
    needs: notify-triggered
    runs-on: __RUNNER_LABEL__

    env:
      CICD_PROJECT_FILE: ${{ vars.CICD_PROJECT_FILE }}
      CICD_DEFAULT_SCHEME: ${{ vars.CICD_DEFAULT_SCHEME }}
      CICD_DEFAULT_CONFIGURATION: ${{ vars.CICD_DEFAULT_CONFIGURATION }}
      CICD_TEST_DESTINATION: ${{ vars.CICD_TEST_DESTINATION }}
      FASTLANE_TEAM_ID: ${{ secrets.FASTLANE_TEAM_ID }}
      FASTLANE_ITC_TEAM_ID: ${{ secrets.FASTLANE_ITC_TEAM_ID }}
      FASTLANE_BUNDLE_IDENTIFIER: ${{ vars.FASTLANE_BUNDLE_IDENTIFIER }}
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
      APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby (only if Fastlane exists)
        if: ${{ hashFiles('fastlane/Fastfile') != '' }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install dependencies (Fastlane)
        if: ${{ hashFiles('fastlane/Fastfile') != '' }}
        run: bundle install

      - name: Select Build Mode
        id: mode
        run: |
          PRESET="${{ github.event.inputs.preset || 'Debug-CICD' }}"
          if [[ "$PRESET" == "Release-CICD" ]]; then
            echo "mode=release" >> $GITHUB_OUTPUT
          else
            echo "mode=build" >> $GITHUB_OUTPUT
          fi

      - name: Run Fastlane (if available)
        if: ${{ hashFiles('fastlane/Fastfile') != '' }}
        run: |
          echo "Using Fastlane..."
          bundle exec fastlane ios ${{ steps.mode.outputs.mode }}

      - name: Run xcodebuild (fallback)
        if: ${{ hashFiles('fastlane/Fastfile') == '' }}
        run: |
          echo "Fastlane not found, using xcodebuild..."

          PROJECT_FILE="${CICD_PROJECT_FILE:-DeploymentDemo.xcodeproj}"
          SCHEME="${CICD_DEFAULT_SCHEME:-DeploymentDemo}"

          if [[ "${{ steps.mode.outputs.mode }}" == "release" ]]; then
            CONFIG="Release"
          else
            CONFIG="Debug"
          fi

          xcodebuild \
            -project "$PROJECT_FILE" \
            -scheme "$SCHEME" \
            -configuration "$CONFIG" \
            -destination "generic/platform=iOS" \
            clean build

  notify-completed:
    runs-on: ubuntu-latest
    needs: ios
    if: always()
    env:
      CICD_CHAT_PROVIDER: ${{ vars.CICD_CHAT_PROVIDER }}
      TEAM_WEBHOOK_URL: ${{ secrets.TEAM_WEBHOOK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Notify build completed
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          STATUS="${{ needs.ios.result }}"
          ./scripts/notify.sh "$STATUS" "$RUN_URL" "${{ github.ref_name }}"
